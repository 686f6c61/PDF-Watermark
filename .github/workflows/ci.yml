name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # Auditoría de dependencias: paralela al lint-and-test para no bloquear
  audit:
    name: Auditoría de dependencias
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      # Falla solo en vulnerabilidades high y critical.
      # Las moderate están revisadas y justificadas en docs/security/dependencies-audit.md.
      - name: Auditoría npm (high+critical)
        run: npm audit --omit=dev --audit-level=high

  lint-and-test:
    name: Lint, tipos y tests unitarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Comprobación de tipos (astro check)
        run: npm run typecheck

      - name: Tests unitarios (Vitest)
        run: npm test

      - name: Build de producción
        run: npm run build

      - name: Guardar artefacto del build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # Tests E2E con Playwright eliminados del CI por decisión explícita.
  # Razón: el runner gestionado a veces falla por cambios en navigator.language,
  # imágenes de Ubuntu o detalles ajenos al código de la app. Los specs siguen
  # disponibles en tests/e2e/ y pueden ejecutarse manualmente con:
  #   npx playwright install chromium --with-deps
  #   npm run build && npm run test:e2e
  # antes de publicar releases.
