name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # Auditoría de dependencias: paralela al lint-and-test para no bloquear
  audit:
    name: Auditoría de dependencias
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      # Falla solo en vulnerabilidades high y critical.
      # Las moderate están revisadas y justificadas en docs/security/dependencies-audit.md.
      - name: Auditoría npm (high+critical)
        run: npm audit --omit=dev --audit-level=high

  lint-and-test:
    name: Lint, tipos y tests unitarios
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Comprobación de tipos (astro check)
        run: npm run typecheck

      - name: Tests unitarios (Vitest)
        run: npm test

      - name: Build de producción
        run: npm run build

      - name: Guardar artefacto del build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  e2e:
    name: Tests end-to-end (Playwright / Chromium)
    # Ubuntu 22.04 explícito: 24.04+ rompe Playwright 1.x por cambios en librerías del sistema
    runs-on: ubuntu-22.04
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Chromium y dependencias del sistema
        run: npx playwright install chromium --with-deps

      # Necesario porque playwright.config.ts arranca "npm run preview",
      # que sirve dist/ y exige un build previo.
      - name: Build de producción
        run: npm run build

      - name: Tests e2e
        run: npm run test:e2e

      # Solo se sube el reporte cuando hay fallos para no consumir cuota de almacenamiento
      - name: Subir reporte de Playwright (solo si falla)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
