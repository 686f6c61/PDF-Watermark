[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Nota: Netlify también lee public/_headers automáticamente.
# Las cabeceras que siguen son equivalentes y actúan como respaldo explícito
# por si se migra a netlify.toml como fuente única de verdad.

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security    = "max-age=63072000; includeSubDomains; preload"
    X-Frame-Options              = "DENY"
    X-Content-Type-Options       = "nosniff"
    Referrer-Policy              = "no-referrer"
    Cross-Origin-Opener-Policy   = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # Hashes sha256 de script-src: scripts inline de hidratacion de Astro
    # (client:load + astro-island), acoplados a la version de astro.
    # tests/unit/security-headers.test.ts los recalcula y rompe CI si cambian.
    Content-Security-Policy      = "default-src 'self'; script-src 'self' 'sha256-QzWFZi+FLIx23tnm9SBU4aEgx4x8DsuASP07mfqol/c=' 'sha256-SaCkFfPruIdTXT8/97JArQmGxiJAL2o4bBDvSgJ5y3Q=' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://*.g.doubleclick.net; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://*.g.doubleclick.net; worker-src 'self' blob:; child-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests"
    Permissions-Policy           = "accelerometer=(), ambient-light-sensor=(), autoplay=(), battery=(), camera=(), cross-origin-isolated=(self), display-capture=(), encrypted-media=(), execution-while-not-rendered=(), execution-while-out-of-viewport=(), fullscreen=(self), geolocation=(), gyroscope=(), hid=(), identity-credentials-get=(), idle-detection=(), magnetometer=(), microphone=(), midi=(), navigation-override=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), serial=(), usb=(), web-share=(), xr-spatial-tracking=(), clipboard-read=(), clipboard-write=(self)"

# Las URLs reales son limpias (Astro build.format: "directory"), asi que el
# no-cache del HTML se aplica ruta a ruta; un patron "/*.html" no casaria.
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/privacidad/"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/en/"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/en/privacy/"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
